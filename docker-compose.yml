services:
  # Base de Datos Principal (Relacional)
  mysql_db:
    image: mysql:8.0
    container_name: school_mysql
    restart: always
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root_secure_password
      MYSQL_DATABASE: school_portal
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  # Base de Datos Secundaria (Documental para Archivos/Biblioteca)
  mongo_db:
    image: mongo:6.0
    container_name: school_mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin_user
      MONGO_INITDB_ROOT_PASSWORD: mongo_secure_password
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # Tu aplicación backend en Node.js
  backend_api:
    build: ./backend
    container_name: school_api
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=school_mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root_secure_password
      - DB_NAME=school_portal
      - MONGO_URI=mongodb://admin_user:mongo_secure_password@school_mongodb:27017/library?authSource=admin
    depends_on:
      - mysql_db
      - mongo_db

   
  # Tu aplicación frontend en Angular servida con Nginx
  frontend_web:
    build: ./frontend # Cambia esto por el nombre de la carpeta de Angular
    container_name: school_web
    restart: always
    ports:
      - "8080:80" # Podrás verlo en localhost:8080
    depends_on:
      - backend_api

volumes:
  mysql_data:
  mongo_data:

